name: macOS-Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write  # required to upload release assets

jobs:
  # Build a release artifact for each supported macOS architecture.
  # See doc/macos-support-matrix.md for the architecture and runner policy.
  macos-release-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15    # Apple Silicon (arm64)
            arch: arm64
          - runner: macos-13    # Intel (x86_64)
            arch: x86_64
    name: Build macOS ${{ matrix.arch }} release
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history needed for version string

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(tr -d '\n' < openage_version)"

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use stable semver (vX.Y.Z), got: ${TAG}" >&2
            exit 1
          fi

          if [[ "v${VERSION}" != "${TAG}" ]]; then
            echo "openage_version (${VERSION}) does not match tag ${TAG}" >&2
            exit 1
          fi

      # ------------------------------------------------------------------ #
      # Caching
      # ------------------------------------------------------------------ #
      - name: Get timestamp
        id: timestamp
        shell: cmake -P {0}
        run: |
          string(TIMESTAMP current_date "%Y-%m-%d-%H:%M:%S" UTC)
          file(APPEND "$ENV{GITHUB_OUTPUT}" "timestamp=${current_date}\n")
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/pip
            ~/Library/Caches/Homebrew
          key: '${{ runner.os }}-${{ matrix.arch }}-release-deps-${{ steps.timestamp.outputs.timestamp }}'
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-release-deps-
      - name: Cache ccache dir
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: '${{ runner.os }}-${{ matrix.arch }}-release-ccache-${{ steps.timestamp.outputs.timestamp }}'
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-release-ccache-

      # ------------------------------------------------------------------ #
      # Dependency installation
      # ------------------------------------------------------------------ #
      - name: Brew update-reset
        run: brew update-reset
      - name: Brew update
        run: brew update
      - name: Brew install DeJaVu fonts
        run: brew install --cask font-dejavu
      - name: Install environment helpers with homebrew
        run: brew install --force ccache
      - name: Install LLVM with homebrew
        run: brew install llvm
      - name: Install openage dependencies with homebrew
        run: brew install cmake python3 libepoxy freetype fontconfig harfbuzz opus opusfile qt6 libogg libpng toml11 eigen
      - name: Install nyan dependencies with homebrew
        run: brew install flex make
      - name: Install python3 packages
        run: pip3 install --upgrade --break-system-packages cython numpy mako lz4 pillow pygments setuptools toml

      # ------------------------------------------------------------------ #
      # Build
      # ------------------------------------------------------------------ #
      - name: Configure
        run: >
          ./configure
          --compiler="$(brew --prefix llvm)/bin/clang++"
          --mode=release
          --ccache
          --download-nyan
          --target-arch=${{ matrix.arch }}
          --macos-deployment-target=13.0
          --prefix=/usr/local

      - name: Build
        run: make -j$(sysctl -n hw.logicalcpu) VERBOSE=1

      - name: Test
        run: make test

      # ------------------------------------------------------------------ #
      # Package
      # ------------------------------------------------------------------ #
      - name: Determine version string
        id: version
        run: |
          VERSION=$(git describe --tags --always)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create tarball
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT="openage-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}"
          test -e bin/run
          mkdir -p "dist/${ARTIFACT}"
          # package the produced build tree for this architecture
          cp -R bin/. "dist/${ARTIFACT}/"
          tar -czf "${ARTIFACT}.tar.gz" -C dist "${ARTIFACT}"
          test -s "${ARTIFACT}.tar.gz"
          echo "ARTIFACT_NAME=${ARTIFACT}" >> "$GITHUB_ENV"
          echo "ARTIFACT_FILE=${ARTIFACT}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_FILE }}
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish macOS release
    needs: macos-release-build
    runs-on: ubuntu-latest
    steps:
      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          pattern: openage-*-macos-*
          path: release-artifacts
          merge-multiple: true

      - name: Verify downloaded bundles
        shell: bash
        run: |
          set -euo pipefail
          ls -l release-artifacts
          count=$(find release-artifacts -maxdepth 1 -type f -name '*.tar.gz' | wc -l)
          if [[ "${count}" -eq 0 ]]; then
            echo "No release bundles were downloaded" >&2
            exit 1
          fi

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
